<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>Webアプリ研修|市区町村別人口検索</title>
	<link rel="stylesheet" type="text/css"
		href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/spring_training.css}" />
	<link rel="stylesheet" type="text/css" th:href="@{/css/municipalityPopulation.css}" />


</head>

<body>
	<div class="container">
		<div class="page-header">
			<h4>
				<a th:href="@{/}" th:text="#{login.text.app}">研修Webアプリ</a><small th:text="#{login.text.version}">ver
					β</small>
			</h4>
		</div>
		<div class="sub-header">
			<a class="pull-right" th:href="@{/menu}" th:text="#{common.text.back}">Back</a><br />
			<h1 align="center" th:text="#{municipalityPopulation.text.search}">MunicipalityPopulationSearch</h1>
		</div>

		<!-- 新規ボタン -->
		<div class="form-group">
			<div class="">
				<a class="btn btn-warning" th:href="@{/municipalityPopulation/insert}" th:text="#{common.text.new}">New
				</a>

			</div>
		</div>


		<!-- メッセージ -->
		<div class="row">
			<div class="col-sm-offset-3 col-sm-7">



				<!-- 検索結果なし -->
				<div class="alert alert-info text-center" role="alert" th:if="${(MunicipalityPopulationSearchForm.municipalityPopulation != null or
							MunicipalityPopulationSearchForm.MunicipalityId != null or
							MunicipalityPopulationSearchForm.PopulationId != null) and
							municipalityPopulationList == null}" th:text="#{common.text.info.search}">No Result
				</div>

				<!-- DB操作後 -->
				<div class="alert alert-info text-center" role="alert" th:if="${param.result != null}">
					<div th:switch="${param.result[0]}">
						<p th:case="insert" th:text="#{common.text.info.insert} + ':ID=' + ${param.id[0]}"></p>
						<p th:case="update" th:text="#{common.text.info.update} + ':ID=' + ${param.id[0]}"></p>
						<p th:case="updatefailed" th:text="#{common.text.info.update.failed}"></p>
						<p th:case="delete" th:text="#{common.text.info.delete} + ':ID=' + ${param.id[0]}"></p>
						<p th:case="deletecomp" th:text="#{common.text.info.deletecomp}"></p>
					</div>
				</div>
			</div>
		</div>

		<!-- 検索条件 -->
		<form class="form-horizontal" id="searchForm" method="post" action="/municipalityPopulation/search"
			th:object="${municipalityPopulationSearchForm}">
			<div class="form-group">
				<label for="municipalityPopulation" class="col-sm-2 control-label"
					th:text="#{municipalityPopulation.text.input.title}">Title:</label>
				<div class="col-sm-8">
					<input type="text" th:field="*{municipalityPopulation}" class="form-control"
						id="inputMunicipalityPopulation" th:placeholder="#{municipalityPopulation.text.search.info}" />
				</div>
			</div>
			<div class="form-group">
				<label for="municipality" class="control-label col-sm-2"
					th:text="#{municipalityPopulation.text.input.municipality}">Municipality:</label>
				<div class="col-sm-8">
					<select id="inputMunicipality" name="municipalityId" class="form-control select">
						<option th:each="municipality : ${municipalityIkebeList}"
							th:value="${municipality.municipalityId}" th:text="${municipality.municipalityCategory}"
							th:selected="${municipality.municipalityId == municpalityPopulationSearchForm.genreId}">
							pulldown
						</option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<label for="population" class="control-label col-sm-2"
					th:text="#{municipalityPopulation.text.input.population}">Actor:</label>
				<div class="col-sm-8">
					<select id="inputPopulation" name="populationId" class="form-control select">
						<option th:each="population : ${populationIkebeList}" th:value="${population.populationId}"
							th:text="${population.populationCategory}"
							th:selected="${population.populationId == municipalityPopulationSearchForm.populationId}">
							pulldown
						</option>
					</select>
				</div>
			</div>
			<div class="form-group">
				<div class="col-xs-offset-3 col-sm-offset-4 col-xs-3 col-sm-2">
					<a class="btn btn-primary center-block" onclick="$('#searchForm').submit()"
						th:text="#{common.text.search}">Search
					</a>
				</div>
				<div class="col-xs-3 col-sm-2">
					<a class="btn btn-warning center-block" th:href="@{municipalityPopulation}"
						th:text="#{common.text.reset}">Reset
					</a>
				</div>
			</div>
		</form>

		<!-- 検索結果の表示 -->
		<section id="resultArea" th:if="${munnicipalityPopulationList != null}">
			<table id="resultTable" class="table table-borderd table-striped table-hover">
				<thead>
					<tr>
						<th class="per-12 center" style="width: 15%"
							th:text="#{municipalityPopulation.text.municipality}">Municipality</th>
						<th class="per-12 center" style="width: 15%"
							th:text="#{municipalityPopulation.text.prefectureName}">PrefectureName</th>
						<th class="per-16 center" style="width: 10%"
							th:text="#{municipalityPopulation.text.population}">Population</th>
						<th class="per-16 center" style="width: 10%"
							th:text="#{municipalityPopulation.text.elderlyPopulation}">ElderlyPopulation</th>
						<th class="per-45 center" style="width: 25%" th:text="#{municipalityPopulation.text.aginglate}">
							Aginglate</th>
						<th class="per-45 center" style="width: 25%"
							th:text="#{municipalityPopulation.text.populationDensity}">PopulationDensity</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="municipalityPopulation : ${municipalityPopulationList}">
						<td class="data center">
							<label th:if="${municipalityPopulation.municipality != null}"
								th:text="${moviemunicipalityPopulation.municipality.municipalityCategory}"
								class="data center">千代田区</label>
						</td>
						<td class="data center" th:text="${municipalityPopulation.prefectureName}">東京都</td>
						<td class="data center">
							<label th:if="${municipalityPopulation.population != null}"
								th:text="${moviemunicipalityPopulation.population.populationCategory}"
								class="data center">69139</label>
						</td>
						<td class="data center" th:text="${municipalityPopulation.eldelyPopulation}">11571</td>
						<td class="data center" th:text="${municipalityPopulation.aginglate}">17</td>
						<td class="data center" th:text="${municipalityPopulation.populationDensity}">5930</td>


					</tr>
				</tbody>
			</table>
		</section>

		<!-- ページング用 -->
		<div th:fragment='paginationbar'>
			<div th:if="${page != null}">
				<ul>
					<li th:class="${page.first} ? 'disabled':''" style="display:inline">
						<span th:if="${page.first}" th:text="#{common.text.paging.lead}">←lead</span>
						<a th:if="${not page.first}" onclick="$('#pageForm0').submit()"
							th:text="#{common.text.paging.lead}">←lead</a>
					</li>
					<li th:each='i : ${#numbers.sequence(0, page.totalPages-1)}'
						th:class="(${i}==${page.number})? 'active' : ''" style="display:inline">
						<form th:id="'pageForm'+${i}" method="post" th:action="@{${url}(page=${i})}"
							th:object="${municipalityPopulationSearchForm}" style="display:inline">
							<input type="hidden" th:field="*{municipality}" />
							<input type="hidden" th:field="*{municipalityId}" />
							<input type="hidden" th:field="*{populationId}" />
						</form>
						<span th:if='${i}==${page.number}' th:text='${i+1}'>1</span>
						<a th:if='${i}!=${page.number}' th:onclick="'$(\'#pageForm'+${i}+'\').submit()'">
							<span th:text='${i+1}'>1</span>
						</a>
					</li>
					<li th:class="${page.last} ? 'disabled':''" style="display:inline">
						<span th:if="${page.last}" th:text="#{common.text.paging.end}">end➝</span>
						<a th:if="${not page.last}" th:onclick="'$(\'#pageForm'+(${page.totalPages}-1)+'\').submit()'"
							th:text="#{common.text.paging.end}">end➝</a>
					</li>
				</ul>
			</div>
		</div>
	</div>

</body>

</html>
