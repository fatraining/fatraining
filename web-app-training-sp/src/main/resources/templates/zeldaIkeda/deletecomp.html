<!DOCTYPE html>
<html xmlns="http://www.3w.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
<title>Webアプリ研修❘ゼルダ完全削除</title>
<script type="text/javascript" src="https://code.jquery.com/jquery-2.2.3.min.js"></script>
<link rel="stylesheet" type="text/css" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/bootstrap.min.css" />
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"></script>
<link rel="stylesheet" type="text/css" th:href="@{/css/spring_training.css}" />
</head>
<link rel="stylesheet" type="text/css" th:href="@{/css/zeldaIkeda.css}" />
<body>
	<div class="container">
			<div class="pge-header">
				<h4>
					<a th:href="@{/}" th:text="#{login.text.app}">研修アプリ</a><small th:text="#{login.text.version}">ver B</small>
				</h4>
			</div>
			<div class="sub-header">
				<h1 align="center" th:text="#{zelda.text.delete}">ZeldaDelete</h1>
				<a th:href="@{/zeldaIkeda}" th:text="#{common.text.back}">Back</a>
			</div>
			
			<!--削除対象データ-->
			<form class="form-horizontal" id="deleteForm" action="/zeldaIkeda/deletecomp"
				th:object="${zeldaDeleteForm}" method="post">
				
				<div th:if="${zeldaMainIkedaList != null}">
					<h3 th:text="#{common.text.info.delete.confirm}">選択したデータを完全に削除します</h3>
					<h4 th:each="err : ${#fields.errors('deleteIds')}" th:text="#{${err}}"
						class="err alert-danger">error message</h4>
				</div>
				<div th:if="${zeldaMainIkedaList == null}">
					<h3 th:text="#{common.text.info.no.delete}">削除するデータがありません</h3>
				</div>
				<div th:if="${zeldaMainIkedaList != null}" class="resultArea col-xs-18 col-sm-12 col-md-10 col-md-offset-2 col-lg-8 col-lg-offset-2">
					<table id="resultTable" class="table table-borderd table-striped table-hover">
						<thead>
							<tr>
								<th><input type="checkbox" id="allCheck"/></th>
								<th class="per-19 center" th:text="#{zelda.text.title}">Title</th>
								<th class="per-12 center" th:text="#{zelda.text.genre}">Genre</th>
								<th class="per-12 center" th:text="#{zelda.text.timeSeries}">TimeSeries</th>
								<th class="per-12 center" th:text="#{zelda.text.compatibleModel}">CompatibleModel</th>
								<th class="per-16 center" th:text="#{zelda.text.releaseYear}">ReleaseYear</th>
								<th class="per-40 center" th:text="#{zelda.text.comment}">Comment</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="zelda : ${zeldaMainIkedaList}">
								<td>
									<label>
										<input type="checkbox" style="margin-left: 50%" th:field="*{deleteIds}"
											th:value="${zelda.zeldaId}"/>
									</label>
								</td>
								<td class="data center" th:text="${zelda.zeldaTitle}">スカイウォードソード</td>
								<td class="date center">
									<label th:if="${zelda.genre !=null}" th:text="${zelda.genre.genre}" class="data center">2D見下ろし型・謎解き</label>
								</td>
								<td class="date center" >
									<label th:if="${zelda.timeSeries !=null}" th:text="${zelda.timeSeries.timeSeries}" class="data center">天地創造</label>
								</td>
								<td class="data center">
									<label th:if="${zelda.compatibleModel != nulll}" th:text="${zelda.compatibleModel.compatibleModel}" class="data center">Wii</label>
								</td>
								<td class="data center" th:text="${zelda.releaseYear}">2011</td>
								<td class="data center" th:text="${zelda.comment}">全ゼルダシリーズの原点。</td>
							</tr>
						</tbody>
					</table>
					<div class="col-sm-offset-4 col-xs-3 col-sm-2">
						<a type="button" class="btn btn-danger center-block btn-case" 
							onclick="multiple('/zeldaIkeda/deletecomp')" 
							th:text="#{zelda.text.deletecomp}">
						</a><br>
					</div>
					<div class="col-xs-3 col-sm-2">
						<a class="btn btn-primary center-block btn-case"
							onclick="multiple('/zeldaIkeda/revoke')"
							th:text="#{zelda.text.revoke}">
						</a>
					</div>
				</div>
			</form>
		</div>

<!--		<div id="bogoCount" class="panel-clear"></div>-->
		
		<script type="text/javascript" src="http://code.jquery.com/jquery-2.2.3.min.js"></script>
		<script th:src="@{/libs/jquery/jquery.js}"></script>
		<script th:src="@{/libs/bootstrap/js/bootstrap.js}"></script>
		
		<!--全選択チェックボックス用スクリプト-->
		<script>
			$('#allCheck').on('change',function(){
				$('input[name=deleteIds]').prop('checked',this.checked);
			})
		
		/*選択分岐スクリプト*/	
			function multiple(u){
				var f=document.querySelector("form");
				var a=f.setAttribute("action",u);
				document.querySelector("form").submit();
			}
		</script>
</body>
</html>
